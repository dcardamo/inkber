name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build debug APK + run unit tests
        env:
          NIXPKGS_ACCEPT_ANDROID_SDK_LICENSE: "1"
        run: |
          nix develop --impure --command bash -c '
            ./gradlew assembleDebug testDebug --no-daemon --stacktrace
          '

      - name: Render and verify e-ink fixture screenshots
        env:
          NIXPKGS_ACCEPT_ANDROID_SDK_LICENSE: "1"
        run: |
          nix develop --impure --command bash -c '
            ./gradlew testDebug --tests "com.dan.inkber.EinkCssDumpTest" --no-daemon &&
            bash tools/fixture-screenshots.sh
          '

      - name: Upload fixture screenshots
        uses: actions/upload-artifact@v4
        with:
          name: fixture-screenshots
          path: docs/screenshots/raw/*.png
          if-no-files-found: error

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: inkber-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/test-results/**/*.xml